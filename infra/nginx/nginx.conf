events {
  worker_connections 1024;
}

http {
  upstream gateway {
    server gateway:3000;
  }

  # Rate limiting zone — 10MB shared memory, 20 req/s per IP
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;

  # Shared proxy behaviour for the gateway (SPA + API).
  # (kept in a map-free include-style block via the location below)

  # ── HTTP :80 → redirect everything to HTTPS ──
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS :443 (self-signed cert) ──
  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /health {
      proxy_pass http://gateway;
      access_log off;
    }

    location / {
      limit_req zone=api burst=40 nodelay;

      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Connection        "";

      proxy_read_timeout  120s;
      proxy_send_timeout  120s;
      proxy_connect_timeout 10s;

      # SSE / streaming support
      proxy_buffering off;
      proxy_cache off;
    }
  }
}
